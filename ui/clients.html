    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h6 class="section-title mb-2">Partenaires & Comptes</h6>
                <h1 class="fw-bold m-0 stat-number">CLIENTS</h1>
            </div>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalClient">
                + Nouveau client
            </button>
        </div>

        <!-- Dashboard Grafana -->
        <div class="card overflow-hidden p-0">
            <iframe
                id="grafanaFrame"
                src="https://psychic-space-couscous-vxwjjqqrqwx2xx99-3000.app.github.dev/grafana/d-solo/add29lk/clients?folderUid=efkczkb452ccgb&orgId=1&timezone=browser&panelId=panel-1&from=now-6h&to=now&kiosk"

    <!-- Modal création/édition -->
    <div class="modal fade" id="modalClient" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalClientTitre">Nouveau client</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formClient">
                        <input type="hidden" id="clientId">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Nom <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="clientNom" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Contact</label>
                                <input type="text" class="form-control" id="clientContactNom">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" id="clientEmail">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Téléphone</label>
                                <input type="tel" class="form-control" id="clientTel">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Adresse</label>
                                <textarea class="form-control" id="clientAdresse" rows="2"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Notes</label>
                                <textarea class="form-control" id="clientNotes" rows="2"></textarea>
                            </div>
                            <div class="col-md-4">
                                <div class="form-check mt-4">
                                    <input class="form-check-input" type="checkbox" id="clientActif" checked>
                                    <label class="form-check-label" for="clientActif">Client actif</label>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-primary" onclick="sauvegarderClient()">Enregistrer</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/bootstrap.bundle.min.js"></script>
    <script src="/static/app-search.js"></script>
    <script>
        const API = '/api/clients/';

        function reloadGrafana() {
            const frame = document.getElementById('grafanaFrame');
            frame.src = frame.src;
        }

        async function editerClient(id) {
            const resp = await fetch(`${API}${id}`);
            const c = await resp.json();

            document.getElementById('clientId').value = c.id;
            document.getElementById('clientNom').value = c.nom || '';
            document.getElementById('clientContactNom').value = c.contact_nom || '';
            document.getElementById('clientEmail').value = c.contact_email || '';
            document.getElementById('clientTel').value = c.contact_telephone || '';
            document.getElementById('clientAdresse').value = c.adresse || '';
            document.getElementById('clientNotes').value = c.notes || '';
            document.getElementById('clientActif').checked = !!c.actif;

            document.getElementById('modalClientTitre').textContent = 'Modifier le client';
            new bootstrap.Modal(document.getElementById('modalClient')).show();
        }

        document.getElementById('modalClient').addEventListener('hidden.bs.modal', () => {
            document.getElementById('clientId').value = '';
            document.getElementById('clientNom').value = '';
            document.getElementById('clientContactNom').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientTel').value = '';
            document.getElementById('clientAdresse').value = '';
            document.getElementById('clientNotes').value = '';
            document.getElementById('clientActif').checked = true;
            document.getElementById('modalClientTitre').textContent = 'Nouveau client';
        });

        async function sauvegarderClient() {
            const id = document.getElementById('clientId').value;

            const payload = {
                nom: document.getElementById('clientNom').value.trim(),
                contact_nom: document.getElementById('clientContactNom').value.trim() || null,
                contact_email: document.getElementById('clientEmail').value.trim() || null,
                contact_telephone: document.getElementById('clientTel').value.trim() || null,
                adresse: document.getElementById('clientAdresse').value.trim() || null,
                notes: document.getElementById('clientNotes').value.trim() || null,
                actif: document.getElementById('clientActif').checked
            };

            if (!payload.nom) {
                alert('Le nom du client est obligatoire.');
                return;
            }

            const url = id ? `${API}${id}` : `${API}`;
            const method = id ? 'PUT' : 'POST';

            const resp = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                bootstrap.Modal.getInstance(document.getElementById('modalClient')).hide();
                reloadGrafana();
            } else {
                const err = await resp.json();
                alert('Erreur : ' + JSON.stringify(err));
            }
        }

        async function supprimerClient(id, nom) {
            if (!confirm(`Supprimer le client "${nom}" ?`)) return;
            const resp = await fetch(`${API}${id}`, { method: 'DELETE' });
            if (resp.ok) {
                reloadGrafana();
            } else {
                alert('Erreur lors de la suppression.');
            }
        }
    </script>
</body>
